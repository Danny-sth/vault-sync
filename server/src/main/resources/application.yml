server:
  port: ${PORT:8443}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE:classpath:keystore.p12}
    key-store-password: ${SSL_PASSWORD:changeit}
    key-store-type: PKCS12
  tomcat:
    # No request-body size cap: binary uploads stream the encrypted blob directly.
    max-swallow-size: -1
    max-http-form-post-size: -1

spring:
  application:
    name: vault-sync-server

  datasource:
    url: jdbc:h2:file:${VAULT_SYNC_DATA:/opt/vault-sync/data}/metadata;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: false

  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

  threads:
    virtual:
      enabled: true

vault-sync:
  storage-path: ${VAULT_SYNC_STORAGE:/opt/vault-sync/files}
  token: ${VAULT_SYNC_TOKEN:}
  # Опциональные ДОП. волты (мультиюзер): каждый поднимается отдельным Spring-контекстом в
  # этом же процессе — свой порт/watcher-поток/H2/storage/токены. Пусто → только основной волт.
  # Пример элемента: { id: lera, port: 8445, storagePath: /opt/obsidian-vault-lera,
  #   token: <sync-token>, mcpToken: <mcp-token>, dbPath: /opt/vault-sync-lera/data }
  extra-vaults: []
  tombstone-ttl-days: ${TOMBSTONE_TTL_DAYS:14}
  # Daily note auto-creation (in-process scheduler, see DailyNoteScheduler)
  daily-note:
    timezone: ${VAULT_SYNC_DAILY_TZ:Asia/Almaty}
  # Command execution (whitelist only)
  commands-path: ${VAULT_SYNC_COMMANDS:/opt/vault-sync/commands}
  command-timeout-seconds: ${VAULT_SYNC_COMMAND_TIMEOUT:30}
  allowed-commands:
    - vpn-russia
    - git-status
    - git-pull

# MCP Server Configuration - Streamable HTTP transport (MCP spec 2025-03-26)
spring.ai.mcp.server:
  enabled: true
  name: vault-sync-mcp
  version: 1.0.0
  type: SYNC
  protocol: STREAMABLE
  streamable-http:
    mcp-endpoint: /mcp

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.vaultsync: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
