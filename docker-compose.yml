version: '3.8'

services:
  vault-sync:
    build: ./server
    container_name: vault-sync
    ports:
      - "8443:8443"
    volumes:
      - ./data:/data
    environment:
      - VAULT_SYNC_TOKEN=${VAULT_SYNC_TOKEN}
      - VAULT_SYNC_STORAGE_PATH=/data
      - SERVER_SSL_ENABLED=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
